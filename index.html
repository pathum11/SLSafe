<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Smart Guard & Search</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --blue: #1976d2; --bg: #f8f9fa; --dark: #1a1c23; }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .screen { display: none; min-height: 100vh; width: 100%; }
        .active-screen { display: block !important; }
        .flex-screen { display: flex !important; flex-direction: column; align-items: center; justify-content: center; }

        /* Login Screen */
        #loginPage { background: white; text-align: center; }
        .login-btn { background: white; border: 1px solid #ddd; padding: 12px 25px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; }

        /* General UI */
        header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--primary); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-family: inherit; margin-top: 8px; box-sizing: border-box; }
        
        /* Buttons */
        .hero-btn { width: 85%; max-width: 350px; padding: 20px; margin: 10px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-red { background: var(--primary); }
        .btn-blue { background: var(--blue); }

        /* Spam List Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; border: none; background: none; }

        .chip { display: inline-block; padding: 6px 12px; background: #eee; border-radius: 20px; font-size: 11px; margin: 3px; cursor: pointer; }
        .chip.selected { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="loginPage" class="screen flex-screen active-screen">
    <h2>ශ්‍රී ලංකා Smart පද්ධතිය</h2>
    <p>ඉදිරියට යාමට ඔබගේ Google ගිණුමෙන් ඇතුල් වන්න</p>
    <button class="login-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Google හරහා සම්බන්ධ වන්න
    </button>
</div>

<div id="homePage" class="screen flex-screen">
    <div id="userInfo" style="margin-bottom: 20px; font-size: 13px;"></div>
    <button class="hero-btn btn-red" onclick="showPage('searchPage')">🚨 හදිසි සේවා සොයන්න</button>
    <button class="hero-btn btn-blue" onclick="showPage('spamPage')">📞 අංක වාර්තා කිරීම (Spam Guard)</button>
    <button id="adminBtn" class="hero-btn" style="background:var(--dark); display:none;" onclick="showPage('adminPage')">⚙️ Admin පාලක මැදිරිය</button>
    <button onclick="logout()" style="margin-top:20px; border:none; background:none; color:grey;">පද්ධතියෙන් ඉවත් වන්න</button>
</div>

<div id="searchPage" class="screen">
    <header>
        <button onclick="showPage('homePage')" style="border:none; background:none; font-size:20px;">🏠</button>
        <b>SMART සෙවුම</b>
        <div style="width:30px;"></div>
    </header>
    <div class="container">
        <div class="card">
            <div style="display:flex; gap:8px;">
                <input type="text" id="manualCity" class="input-box" style="margin:0;" placeholder="නගරය ඇතුළත් කරන්න (Manual Search)...">
                <button onclick="manualSearch()" style="background:var(--blue); color:white; border:none; padding:10px; border-radius:8px;">සොයන්න</button>
            </div>
            <div id="searchStatus" style="font-size:11px; margin-top:8px; text-align:center;">නගරය ටයිප් කර බොත්තම ඔබන්න.</div>
        </div>
        <div id="searchResults"></div>
    </div>
</div>

<div id="spamPage" class="screen">
    <header>
        <button onclick="showPage('homePage')" style="border:none; background:none; font-size:20px;">🏠</button>
        <b>අංක වාර්තා කිරීම</b>
        <div style="width:30px;"></div>
    </header>
    <div class="container">
        <div class="card">
            <input type="text" id="numSearch" class="input-box" placeholder="🔍 පෙර ඇතුළත් කළ අංකයක් සොයන්න..." oninput="searchInList(this.value)">
        </div>

        <div class="card">
            <b>+ අලුත් අංකයක් එක් කරන්න</b>
            <input type="text" id="newNum" class="input-box" placeholder="07XXXXXXXX">
            <div id="reasonList" style="margin-top:10px;"></div>
            <button class="hero-btn btn-red" style="width:100%; margin:15px 0 0 0;" onclick="submitNumber()">වාර්තා කරන්න</button>
        </div>

        <div class="card">
            <b>🚫 අවහිර කළ අංක (Block List)</b>
            <div id="blockListView">පූරණය වෙමින්...</div>
        </div>
    </div>
</div>

<div id="adminPage" class="screen">
    <header>
        <button onclick="showPage('homePage')" style="border:none; background:none; font-size:20px;">🏠</button>
        <b>පාලක මැදිරිය</b>
        <div style="width:30px;"></div>
    </header>
    <div class="container">
        <div class="card">
            <b>හේතු කළමනාකරණය (Manage Reasons)</b>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="reasonInp" class="input-box" style="margin:0;" placeholder="අලුත් හේතුවක්...">
                <button onclick="addReason()" style="background:green; color:white; border:none; padding:10px; border-radius:8px;">+</button>
            </div>
            <div id="adminReasons" style="margin-top:10px;"></div>
        </div>
        
        <div class="card">
            <b>දත්ත පාලනය (Manage All Numbers)</b>
            <div id="adminAllNums" style="overflow-x:auto;"></div>
        </div>
    </div>
</div>

<script>
// --- Firebase Configuration (ඔබගේ Firebase කරුණු මෙතැනට එක් කරන්න) ---
const firebaseConfig = {
    apiKey: "AIzaSy...", 
    authDomain: "your-app.firebaseapp.com",
    databaseURL: "https://your-app.firebaseio.com",
    projectId: "your-app",
    storageBucket: "your-app.appspot.com",
    messagingSenderId: "...",
    appId: "..."
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const ADMIN_EMAIL = "www.pathum.log@gmail.com";

let currentUser = null;

// --- 03. Google Auth & Sign In ---
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('userInfo').innerText = `පරිශීලක: ${user.displayName}`;
        showPage('homePage');
        if(user.email === ADMIN_EMAIL) document.getElementById('adminBtn').style.display = 'block';
        loadData();
    } else {
        showPage('loginPage');
    }
});

function logout() { auth.signOut(); }

// --- Navigation ---
function showPage(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen', 'flex-screen'));
    const p = document.getElementById(id);
    if(id === 'homePage' || id === 'loginPage') p.classList.add('flex-screen', 'active-screen');
    else p.classList.add('active-screen');
}

// --- 01. Manual Search Fix ---
async function manualSearch() {
    const city = document.getElementById('manualCity').value;
    if(!city) return alert("කරුණාකර නගරයක් ඇතුළත් කරන්න.");
    
    document.getElementById('searchStatus').innerText = "සොයමින්...";
    try {
        const geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}&countrycodes=lk&limit=1`);
        const data = await geo.json();
        if(data.length > 0) {
            // මෙහිදී ඔබගේ පැරණි startSearch() ශ්‍රිතය lat/lon යොදා කැඳවිය හැක.
            document.getElementById('searchStatus').innerText = `📍 සොයාගත්තා: ${data[0].display_name}`;
        } else {
            document.getElementById('searchStatus').innerText = "නගරය හමු නොවීය.";
        }
    } catch(e) { alert("දෝෂයකි!"); }
}

// --- 04 & 05. Spam System Logic ---
let allNumbers = {};
let reasons = ["Spam", "Scam", "Fake"];

function loadData() {
    db.ref('reasons').on('value', s => {
        reasons = s.val() ? Object.values(s.val()) : ["Spam", "Scam"];
        renderReasons();
    });
    
    db.ref('reports').on('value', s => {
        allNumbers = s.val() || {};
        renderBlockList();
    });
}

function renderReasons() {
    const container = document.getElementById('reasonList');
    const adminCont = document.getElementById('adminReasons');
    container.innerHTML = ""; adminCont.innerHTML = "";
    reasons.forEach(r => {
        container.innerHTML += `<div class="chip" onclick="this.classList.toggle('selected')">${r}</div>`;
        adminCont.innerHTML += `<div class="chip">${r} <span onclick="deleteReason('${r}')" style="color:red; margin-left:5px;">×</span></div>`;
    });
}

function submitNumber() {
    const num = document.getElementById('newNum').value;
    if(!num || num.length < 10) return alert("නිවැරදි අංකයක් ඇතුළත් කරන්න.");
    
    const selected = Array.from(document.querySelectorAll('#reasonList .selected')).map(c => c.innerText);
    
    // 2. එකම අංකය දෙවරකට වඩා වාර්තා වූ විට පමණක් ලැයිස්තුවට එක් කිරීමේ logic එක
    const existing = Object.values(allNumbers).filter(x => x.number === num).length;
    
    db.ref('reports').push({
        number: num,
        reasons: selected,
        reportedBy: currentUser.email,
        timestamp: Date.now()
    });
    alert("වාර්තා කිරීම සාර්ථකයි.");
}

function renderBlockList() {
    const view = document.getElementById('blockListView');
    const adminView = document.getElementById('adminAllNums');
    
    // 2. අවම වශයෙන් 2 වතාවක් වාර්තා වූ අංක පෙරීම
    const counts = {};
    Object.values(allNumbers).forEach(x => counts[x.number] = (counts[x.number] || 0) + 1);
    
    let html = `<table><tr><th>අංකය</th><th>වාර්තා ගණන</th></tr>`;
    for(let n in counts) {
        if(counts[n] >= 2) html += `<tr><td>${n}</td><td>${counts[n]} වතාවක්</td></tr>`;
    }
    view.innerHTML = html + `</table>`;
    
    // Admin Table (සියල්ල වෙනස් කිරීමට/මැකීමට)
    if(currentUser.email === ADMIN_EMAIL) {
        let adminHtml = `<table><tr><th>අංකය</th><th>ක්‍රියා</th></tr>`;
        Object.keys(allNumbers).forEach(key => {
            adminHtml += `<tr><td>${allNumbers[key].number}</td>
            <td><button class="delete-btn" onclick="deleteEntry('${key}')">ඉවත් කරන්න</button></td></tr>`;
        });
        adminView.innerHTML = adminHtml + `</table>`;
    }
}

function deleteEntry(key) { if(confirm("මෙය ඉවත් කරන්නද?")) db.ref('reports').child(key).remove(); }
function addReason() {
    const r = document.getElementById('reasonInp').value;
    if(r) db.ref('reasons').push(r);
}
function deleteReason(val) {
    db.ref('reasons').orderByValue().equalTo(val).once('value', s => {
        s.forEach(child => child.ref.remove());
    });
}

// 04. Search in Block List
function searchInList(val) {
    const rows = document.querySelectorAll('#blockListView tr');
    rows.forEach((r, i) => {
        if(i === 0) return;
        r.style.display = r.innerText.includes(val) ? "" : "none";
    });
}
</script>
</body>
</html>

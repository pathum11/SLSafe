<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Location Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <div class="container">
        <header>
            <h1>🇱🇰 SL Assistant</h1>
            <p>ස්ථාන සහ දුරකථන අංක පරීක්ෂාව</p>
        </header>

        <section class="card">
            <h3>📍 වත්මන් ස්ථානය (Location)</h3>
            <button onclick="detectLocation()">ස්ථානය හඳුනාගන්න</button>
            <div id="locationResult" class="result">මෙහි නම දිස්වේ...</div>
        </section>

        <section class="card">
            <h3>🔍 නගරය සොයන්න (Search)</h3>
            <input type="text" id="cityInput" placeholder="නගරයේ නම ටයිප් කරන්න..." oninput="fetchSuggestions(this.value)">
            <ul id="suggestionList"></ul>
        </section>

        <section class="card">
            <h3>📞 අංක පරීක්ෂාව (Phone Lookup)</h3>
            <input type="tel" id="phoneInput" placeholder="07X XXXXXXX">
            <button onclick="checkPhone()">සොයන්න</button>
            <div id="phoneResult" class="result">නම: Unknown</div>
        </section>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>

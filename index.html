<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Smart Search - With Mini Maps</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --blue: #1976d2; --bg: #f0f2f5; --success: #2e7d32; }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .location-box { background: #e3f2fd; padding: 10px; border-radius: 10px; font-size: 13px; color: #1565c0; margin-bottom: 15px; text-align: center; border: 1px solid #bbdefb; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .grid-item { background: white; border: 1px solid #eee; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
        .result-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        .mini-map { height: 150px; width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; z-index: 1; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; display: inline-block; margin-right: 5px; }
        .dist-badge { background: #2e7d32; }
        .time-badge { background: #e65100; }
        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; }
        .call-btn { background: var(--blue); }
        .dir-btn { background: var(--success); }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body onload="initLocation()">

<header><b style="color:var(--primary)">ශ්‍රී ලංකා SMART සෙවුම (මාර්ග සිතියම් සහිත)</b></header>

<div class="container">
    <div id="locDisplay" class="location-box">ස්ථානය ලබාගනිමින්...</div>
    <div class="grid">
        <div class="grid-item" onclick="startSearch('police', 'පොලිසිය')">🚨<br>පොලිසිය</div>
        <div class="grid-item" onclick="startSearch('hospital', 'රෝහල')">🏥<br>රෝහල්</div>
        <div class="grid-item" onclick="startSearch('fire_station', 'ගිනි නිවන')">🚒<br>ගිනි නිවන</div>
        <div class="grid-item" onclick="startSearch('pharmacy', 'ඔසුසල')">💊<br>ඔසුසල්</div>
        <div class="grid-item" onclick="startSearch('atm', 'ATM')">🏧<br>ATM</div>
        <div class="grid-item" onclick="startSearch('fuel', 'පිරවුම්හල')">⛽<br>ඉන්ධන</div>
    </div>
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var userLat, userLon;
    const GEMINI_API_KEY = "AIzaSyBphi5HUEHNCKV1zr4h5ZI8aKSKAByHPpU";

    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                userLat = p.coords.latitude; userLon = p.coords.longitude;
                document.getElementById('locDisplay').innerText = "📍 ස්ථානය හඳුනාගත්තා";
            });
        }
    }

    async function startSearch(type, siName) {
        if (!userLat) return alert("Location ලබාගන්නා තෙක් සිටින්න.");
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<div class="loading">ළඟම ස්ථාන සොයමින්...</div>`;

        try {
            const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=${type}](around:10000,${userLat},${userLon});out 5;`;
            const response = await fetch(overpassUrl);
            const data = await response.json();
            resDiv.innerHTML = "";

            for (let item of data.elements) {
                const cardId = `card-${item.id}`;
                const mapId = `map-${item.id}`;
                
                // OSRM Data for Real Distance
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${userLon},${userLat};${item.lon},${item.lat}?overview=full&geometries=geojson`;
                const osrmRes = await fetch(osrmUrl);
                const osrmData = await osrmRes.json();
                
                let dist = "0 KM", time = "0 min", routeCoords = null;
                if (osrmData.routes && osrmData.routes[0]) {
                    dist = (osrmData.routes[0].distance / 1000).toFixed(2) + " KM";
                    time = Math.round(osrmData.routes[0].duration / 60) + " min";
                    routeCoords = osrmData.routes[0].geometry;
                }

                resDiv.innerHTML += `
                    <div class="result-card">
                        <h4 id="title-${cardId}">${item.tags.name || siName}</h4>
                        <span class="badge dist-badge">🛣️ ${dist}</span>
                        <span class="badge time-badge">⏱️ ${time}</span>
                        <div id="${mapId}" class="mini-map"></div>
                        <div class="action-btns">
                            <a href="tel:${item.tags.phone || ''}" class="btn call-btn">අමතන්න</a>
                            <a href="https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${item.lat},${item.lon}&travelmode=driving" target="_blank" class="btn dir-btn">Google Maps</a>
                        </div>
                    </div>
                `;

                // Render Mini Map for each card
                setTimeout(() => {
                    var map = L.map(mapId, { zoomControl: false }).setView([item.lat, item.lon], 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    // Markers
                    L.circleMarker([userLat, userLon], { color: 'blue', radius: 6 }).addTo(map).bindPopup("ඔබ");
                    L.marker([item.lat, item.lon]).addTo(map).bindPopup(item.tags.name || siName);

                    // Draw Route Line
                    if (routeCoords) {
                        L.geoJSON(routeCoords, { color: 'red', weight: 4 }).addTo(map);
                        var bounds = L.latLngBounds([[userLat, userLon], [item.lat, item.lon]]);
                        map.fitBounds(bounds, { padding: [20, 20] });
                    }
                }, 100);

                improveWithAI(cardId, item.tags.name || siName, "", siName);
            }
        } catch (e) { resDiv.innerHTML = "දෝෂයකි!"; }
    }

    async function improveWithAI(cardId, name, addr, category) {
        const prompt = `Short Sinhala name for: ${name}. Category: ${category}. Format: JSON {"name": "..."}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const cleanJson = JSON.parse(text.replace(/```json|```/g, ""));
            if (cleanJson.name) document.getElementById(`title-${cardId}`).innerText = cleanJson.name + " ✨";
        } catch (e) { }
    }
</script>
</body>
</html>

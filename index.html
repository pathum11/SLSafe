<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Smart Search - 10KM Full Range</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --blue: #1976d2; --bg: #f0f2f5; --success: #2e7d32; }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .location-box { background: #e3f2fd; padding: 10px; border-radius: 10px; font-size: 13px; color: #1565c0; margin-bottom: 15px; text-align: center; border: 1px solid #bbdefb; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .grid-item { background: white; border: 1px solid #eee; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .grid-item:active { background: #fff5f5; transform: scale(0.95); }
        .result-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        .mini-map { height: 160px; width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; z-index: 1; }
        .badge-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; }
        .dist-badge { background: #2e7d32; }
        .time-badge { background: #e65100; }
        .action-btns { display: flex; gap: 8px; }
        .btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; }
        .call-btn { background: var(--blue); }
        .dir-btn { background: var(--success); }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body onload="initLocation()">

<header><b style="color:var(--primary)">ශ්‍රී ලංකා SMART සෙවුම (10KM)</b></header>

<div class="container">
    <div id="locDisplay" class="location-box">ස්ථානය ලබාගනිමින්...</div>
    <div class="grid">
        <div class="grid-item" onclick="startSearch('police', 'පොලිසිය')">🚨<br>පොලිසිය</div>
        <div class="grid-item" onclick="startSearch('hospital', 'රෝහල')">🏥<br>රෝහල්</div>
        <div class="grid-item" onclick="startSearch('fire_station', 'ගිනි නිවන')">🚒<br>ගිනි නිවන</div>
        <div class="grid-item" onclick="startSearch('pharmacy', 'ඔසුසල')">💊<br>ඔසුසල්</div>
        <div class="grid-item" onclick="startSearch('atm', 'ATM')">🏧<br>ATM</div>
        <div class="grid-item" onclick="startSearch('fuel', 'පිරවුම්හල')">⛽<br>ඉන්ධන</div>
    </div>
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var uLat, uLon;
    const GEMINI_API_KEY = "AIzaSyBphi5HUEHNCKV1zr4h5ZI8aKSKAByHPpU";

    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                uLat = p.coords.latitude; uLon = p.coords.longitude;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${uLat}&lon=${uLon}`)
                .then(r => r.json()).then(d => {
                    document.getElementById('locDisplay').innerText = "📍 වත්මන් ස්ථානය: " + (d.address.city || d.address.town || "හඳුනාගත්තා");
                });
            });
        }
    }

    async function startSearch(type, siName) {
        if (!uLat) return alert("Location ලබාගන්නා තෙක් සිටින්න.");
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<div class="loading">10km ඇතුළත සියලුම ${siName} සොයමින්...</div>`;

        try {
            // "out;" මගින් සියලුම ප්‍රතිඵල ලබාගනී
            const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=${type}](around:10000,${uLat},${uLon});out;`;
            const response = await fetch(overpassUrl);
            const data = await response.json();
            
            if (data.elements.length === 0) {
                resDiv.innerHTML = "10km ඇතුළත කිසිවක් හමු නොවීය.";
                return;
            }

            let processed = [];
            for (let item of data.elements) {
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${uLon},${uLat};${item.lon},${item.lat}?overview=full&geometries=geojson`;
                try {
                    const osrmRes = await fetch(osrmUrl);
                    const osrmData = await osrmRes.json();
                    if (osrmData.routes && osrmData.routes[0]) {
                        const r = osrmData.routes[0];
                        processed.push({
                            id: item.id,
                            name: item.tags.name || siName,
                            phone: item.tags.phone || item.tags["contact:phone"] || "",
                            distVal: r.distance / 1000,
                            distTxt: (r.distance / 1000).toFixed(2) + " KM",
                            timeTxt: Math.round(r.duration / 60) + " min",
                            geom: r.geometry,
                            lat: item.lat, lon: item.lon
                        });
                    }
                } catch(e) {}
            }

            // ළඟම එක මුලට එන සේ Sort කිරීම
            processed.sort((a, b) => a.distVal - b.distVal);

            resDiv.innerHTML = `<p style="font-size:12px; text-align:center;">ස්ථාන ${processed.length} ක් හමු විය.</p>`;
            
            processed.forEach(res => {
                const mapId = `map-${res.id}`;
                resDiv.innerHTML += `
                    <div class="result-card">
                        <h4 id="title-${res.id}">${res.name}</h4>
                        <div class="badge-row">
                            <span class="badge dist-badge">🛣️ ${res.distTxt}</span>
                            <span class="badge time-badge">⏱️ ${res.timeTxt} පමණ</span>
                        </div>
                        <div id="${mapId}" class="mini-map"></div>
                        <div class="action-btns">
                            <a href="tel:${res.phone}" class="btn call-btn" ${!res.phone ? 'style="opacity:0.3;pointer-events:none"' : ''}>අමතන්න</a>
                            <a href="https://www.google.com/maps/dir/?api=1&origin=${uLat},${uLon}&destination=${res.lat},${res.lon}&travelmode=driving" target="_blank" class="btn dir-btn">Google Maps</a>
                        </div>
                    </div>
                `;

                // සිතියම ඇඳීම
                setTimeout(() => {
                    var map = L.map(mapId, { zoomControl: false }).setView([res.lat, res.lon], 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    L.circleMarker([uLat, uLon], { color: 'blue', radius: 5 }).addTo(map);
                    L.marker([res.lat, res.lon]).addTo(map);
                    if (res.geom) {
                        L.geoJSON(res.geom, { color: 'red', weight: 3 }).addTo(map);
                        map.fitBounds(L.geoJSON(res.geom).getBounds(), { padding: [20, 20] });
                    }
                }, 100);

                improveWithAI(res.id, res.name, siName);
            });

        } catch (e) { resDiv.innerHTML = "දෝෂයකි!"; }
    }

    async function improveWithAI(id, name, cat) {
        const prompt = `Short Sinhala name for: ${name} (${cat}). Format: JSON {"name": "..."}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const cleanJson = JSON.parse(text.replace(/```json|```/g, ""));
            if (cleanJson.name) document.getElementById(`title-${id}`).innerText = cleanJson.name + " ✨";
        } catch (e) {}
    }
</script>
</body>
</html>

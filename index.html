<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Smart Search - 10KM All Places</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --blue: #1976d2; --bg: #f0f2f5; --success: #2e7d32; }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .location-box { background: #e3f2fd; padding: 10px; border-radius: 10px; font-size: 13px; color: #1565c0; margin-bottom: 15px; text-align: center; border: 1px solid #bbdefb; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .grid-item { background: white; border: 1px solid #eee; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
        .grid-item:active { background: #fff5f5; transform: scale(0.95); }
        .result-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 6px solid var(--primary); box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        .result-card h4 { margin: 0 0 8px 0; font-size: 15px; color: #1a1a1a; }
        .badge-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; }
        .dist-badge { background: #2e7d32; }
        .time-badge { background: #e65100; }
        .details { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 12px; }
        .action-btns { display: flex; gap: 8px; }
        .btn { flex: 1; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; }
        .call-btn { background: var(--blue); }
        .dir-btn { background: var(--success); }
        .loading { text-align: center; padding: 20px; color: #666; font-style: italic; font-size: 13px; }
    </style>
</head>
<body onload="initLocation()">

<header><b style="color:var(--primary)">ශ්‍රී ලංකා SMART සෙවුම (10KM සීමාව)</b></header>

<div class="container">
    <div id="locDisplay" class="location-box">ස්ථානය ලබාගනිමින්...</div>
    <div class="grid">
        <div class="grid-item" onclick="startSearch('police', 'පොලිසිය')">🚨<br>පොලිසිය</div>
        <div class="grid-item" onclick="startSearch('hospital', 'රෝහල')">🏥<br>රෝහල්</div>
        <div class="grid-item" onclick="startSearch('fire_station', 'ගිනි නිවන')">🚒<br>ගිනි නිවන</div>
        <div class="grid-item" onclick="startSearch('pharmacy', 'ඔසුසල')">💊<br>ඔසුසල්</div>
        <div class="grid-item" onclick="startSearch('atm', 'ATM')">🏧<br>ATM</div>
        <div class="grid-item" onclick="startSearch('fuel', 'පිරවුම්හල')">⛽<br>ඉන්ධන</div>
    </div>
    <div id="results"></div>
</div>

<script>
    var lat, lon;
    const GEMINI_API_KEY = "AIzaSyBphi5HUEHNCKV1zr4h5ZI8aKSKAByHPpU";

    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude; lon = p.coords.longitude;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(r => r.json()).then(d => {
                    document.getElementById('locDisplay').innerText = "📍 ස්ථානය: " + (d.address.city || d.address.town || "හඳුනාගත්තා");
                });
            });
        }
    }

    async function startSearch(type, siName) {
        if (!lat) return alert("Location ලබාගන්නා තෙක් සිටින්න.");
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<div class="loading">10km ඇතුළත සියලුම ${siName} සොයමින්...</div>`;

        try {
            // "out;" ලෙස වෙනස් කිරීමෙන් සියලුම ප්‍රතිඵල ලැබේ (සීමාවක් නැත)
            const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=${type}](around:10000,${lat},${lon});out;`;
            const response = await fetch(overpassUrl);
            const data = await response.json();
            
            if (data.elements.length === 0) { 
                resDiv.innerHTML = "10km ඇතුළත කිසිදු ස්ථානයක් හමු නොවීය."; 
                return; 
            }

            resDiv.innerHTML = `<p style='font-size:12px; text-align:center;'>ස්ථාන ${data.elements.length} ක් හමු විය. දුර ගණනය කරමින්...</p>`;

            let processedResults = [];

            // සියලුම ස්ථාන සඳහා පාර දිගේ දුර ගණනය කිරීම
            for (let item of data.elements) {
                try {
                    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${lon},${lat};${item.lon},${item.lat}?overview=false`;
                    const osrmRes = await fetch(osrmUrl);
                    const osrmData = await osrmRes.json();
                    
                    if (osrmData.routes && osrmData.routes[0]) {
                        const route = osrmData.routes[0];
                        processedResults.push({
                            id: item.id,
                            name: item.tags.name || siName,
                            phone: item.tags.phone || item.tags["contact:phone"] || "ලබාගත නොහැක",
                            addr: (item.tags["addr:street"] || "") + " " + (item.tags["addr:suburb"] || ""),
                            distVal: route.distance / 1000,
                            distTxt: (route.distance / 1000).toFixed(2) + " KM",
                            timeTxt: Math.round(route.duration / 60) + " min",
                            lat: item.lat,
                            lon: item.lon
                        });
                    }
                } catch (e) { console.log("Distance error for one item"); }
            }

            // දුර අනුව පෙළගැස්වීම (ළඟම එක මුලට)
            processedResults.sort((a, b) => a.distVal - b.distVal);

            resDiv.innerHTML = ""; // කලින් තිබූ loading පණිවිඩය ඉවත් කිරීම
            
            processedResults.forEach(res => {
                const cardId = `card-${res.id}`;
                resDiv.innerHTML += `
                    <div class="result-card" id="${cardId}">
                        <h4 id="title-${cardId}">${res.name}</h4>
                        <div class="badge-row">
                            <span class="badge dist-badge">🛣️ ${res.distTxt}</span>
                            <span class="badge time-badge">⏱️ ${res.timeTxt} පමණ</span>
                        </div>
                        <div class="details" id="addr-${cardId}">📍 ${res.addr || "ප්‍රදේශය අසල"}</div>
                        <div class="action-btns">
                            <a href="tel:${res.phone}" class="btn call-btn">අමතන්න</a>
                            <a href="https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${res.lat},${res.lon}&travelmode=driving" target="_blank" class="btn dir-btn">මාර්ගය</a>
                        </div>
                    </div>
                `;
                // AI මගින් විස්තර වැඩිදියුණු කිරීම
                improveWithAI(cardId, res.name, res.addr, siName);
            });

        } catch (e) { resDiv.innerHTML = "දත්ත ලබාගැනීමේ දෝෂයකි!"; }
    }

    async function improveWithAI(cardId, name, addr, category) {
        const prompt = `Convert to clean Sinhala: Name: ${name}, Address: ${addr}. Category: ${category}. Format as JSON: {"name": "...", "address": "..."}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const cleanJson = JSON.parse(text.replace(/```json|```/g, ""));
            
            if (cleanJson.name) {
                document.getElementById(`title-${cardId}`).innerHTML = cleanJson.name + ` <small style="font-size:9px; color:purple;">✨</small>`;
                document.getElementById(`addr-${cardId}`).innerHTML = "📍 " + cleanJson.address;
            }
        } catch (e) { }
    }
</script>
</body>
</html>

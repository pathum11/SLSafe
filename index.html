<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Smart Search AI - Manual Location</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --blue: #1976d2; --bg: #f8f9fa; }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        
        /* Location Search Box */
        .location-section { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-group { position: relative; display: flex; gap: 5px; }
        .loc-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; }
        .auto-btn { background: var(--blue); color: white; border: none; padding: 0 10px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        
        /* Suggestions List */
        .suggestions { position: absolute; top: 100%; left: 0; right: 45px; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px; z-index: 2000; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .suggestion-item:hover { background: #f0f7ff; }

        .current-status { font-size: 12px; color: #1565c0; margin-top: 8px; font-weight: bold; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .grid-item { background: white; border: 1px solid #eee; padding: 12px 2px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 10px; font-weight: bold; }
        .grid-item:active { transform: scale(0.95); background: #fff5f5; }
        .icon { font-size: 22px; display: block; margin-bottom: 5px; }

        .result-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .mini-map { height: 170px; width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; color: white; display: inline-block; background: #2e7d32; }
        
        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; border: none; }
        .call-btn { background: var(--blue); }
        .dir-btn { background: #2e7d32; }
        .loading { text-align: center; padding: 30px; font-size: 14px; color: #666; }
    </style>
</head>
<body onload="initAutoLocation()">

<header><b style="color:var(--primary)">ශ්‍රී ලංකා SMART සෙවුම</b></header>

<div class="container">
    <div class="location-section">
        <div class="input-group">
            <input type="text" id="locInput" class="loc-input" placeholder="නගරය හෝ ස්ථානය ටයිප් කරන්න..." oninput="searchLocation(this.value)">
            <button class="auto-btn" onclick="initAutoLocation()" title="Auto Location">📍</button>
            <div id="suggestionBox" class="suggestions"></div>
        </div>
        <div id="statusTxt" class="current-status">ස්ථානය ලබාගනිමින්...</div>
    </div>
    
    <div class="grid">
        <div class="grid-item" onclick="startSearch('fuel', 'පිරවුම්හල')"><span class="icon">⛽</span>ඉන්ධන</div>
        <div class="grid-item" onclick="startSearch('bank', 'බැංකුව')"><span class="icon">🏦</span>බැංකු</div>
        <div class="grid-item" onclick="startSearch('atm', 'ATM')"><span class="icon">🏧</span>ATM</div>
        <div class="grid-item" onclick="startSearch('hospital', 'රෝහල')"><span class="icon">🏥</span>රෝහල්</div>
        <div class="grid-item" onclick="startSearch('police', 'පොලිසිය')"><span class="icon">🚨</span>පොලිසිය</div>
        <div class="grid-item" onclick="startSearch('pharmacy', 'ඔසුසල')"><span class="icon">💊</span>ඔසුසල්</div>
        <div class="grid-item" onclick="startSearch('car_repair', 'සර්විස්')"><span class="icon">🛠️</span>සර්විස්</div>
        <div class="grid-item" onclick="startSearch('toilets', 'වැසිකිළි')"><span class="icon">🚻</span>වැසිකිළි</div>
    </div>
    
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var uLat, uLon;
    const API_KEY = "AIzaSyBphi5HUEHNCKV1zr4h5ZI8aKSKAByHPpU";

    // 1. Auto Location (GPS)
    function initAutoLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                setCoords(p.coords.latitude, p.coords.longitude, "වත්මන් ස්ථානය (Auto)");
            }, () => {
                document.getElementById('statusTxt').innerHTML = "<span style='color:red'>Auto Location දෝෂයකි. Manual ටයිප් කරන්න.</span>";
            });
        }
    }

    // 2. Manual Location Search (Suggestions)
    async function searchLocation(query) {
        const box = document.getElementById('suggestionBox');
        if (query.length < 3) { box.style.display = 'none'; return; }

        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=lk&limit=5`);
            const data = await res.json();
            box.innerHTML = "";
            if (data.length > 0) {
                box.style.display = 'block';
                data.forEach(place => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = place.display_name;
                    div.onclick = () => {
                        setCoords(place.lat, place.lon, place.display_name);
                        box.style.display = 'none';
                        document.getElementById('locInput').value = place.display_name.split(',')[0];
                    };
                    box.appendChild(div);
                });
            }
        } catch (e) {}
    }

    function setCoords(lat, lon, label) {
        uLat = parseFloat(lat);
        uLon = parseFloat(lon);
        document.getElementById('statusTxt').innerHTML = `📍 ස්ථානය: ${label}`;
        document.getElementById('results').innerHTML = ""; // පරණ ප්‍රතිඵල මකන්න
    }

    // 3. Search Categories (10KM)
    async function startSearch(type, siName) {
        if (!uLat) return alert("කරුණාකර ස්ථානයක් තෝරන්න.");
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = `<div class="loading">තෝරාගත් ස්ථානයේ සිට ${siName} සොයමින්...</div>`;

        try {
            const url = `https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=${type}](around:10000,${uLat},${uLon});out;`;
            const response = await fetch(url);
            const data = await response.json();
            
            let list = [];
            for (let item of data.elements) {
                let name = item.tags.name;
                if (!name) {
                    try {
                        const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${item.lat}&lon=${item.lon}`);
                        const geoData = await geo.json();
                        const village = geoData.address.suburb || geoData.address.village || geoData.address.town || "";
                        name = village ? `${siName} (${village})` : siName;
                    } catch(e) { name = siName; }
                }
                const d = getDistance(uLat, uLon, item.lat, item.lon);
                list.push({ id: item.id, name, dist: d, lat: item.lat, lon: item.lon, phone: item.tags.phone || "" });
            }
            list.sort((a, b) => a.dist - b.dist);
            renderResults(list);
        } catch (e) { resDiv.innerHTML = "දෝෂයකි!"; }
    }

    function getDistance(l1, n1, l2, n2) {
        let R = 6371;
        let dL = (l2-l1)*Math.PI/180, dN = (n2-n1)*Math.PI/180;
        let a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dN/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function renderResults(list) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = list.length === 0 ? "ප්‍රතිඵල නැත." : "";
        list.forEach(res => {
            const mid = `map-${res.id}`;
            resDiv.innerHTML += `
                <div class="result-card">
                    <h4 id="t-${res.id}">${res.name}</h4>
                    <span class="badge">🛣️ ${res.dist.toFixed(2)} KM</span>
                    <div id="${mid}" class="mini-map"></div>
                    <div class="action-btns">
                        <a href="tel:${res.phone}" class="btn call-btn" ${!res.phone ? 'style="display:none"' : ''}>අමතන්න</a>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${res.lat},${res.lon}" target="_blank" class="btn dir-btn">මාර්ගය</a>
                    </div>
                </div>`;
            setTimeout(() => {
                var map = L.map(mid, { zoomControl: false }).setView([res.lat, res.lon], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([res.lat, res.lon]).addTo(map);
            }, 400);
            improveAI(res.id, res.name);
        });
    }

    async function improveAI(id, name) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Translate "${name}" to clean short Sinhala. JSON: {"n":"..."}` }] }] })
            });
            const d = await res.json();
            const clean = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            if (clean.n) document.getElementById(`t-${id}`).innerText = clean.n;
        } catch (e) {}
    }
</script>
</body>
</html>
